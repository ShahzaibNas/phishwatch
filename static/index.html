<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishWatch — Lookalike Domain Scanner</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0;
            --accent:#38bdf8; --danger:#f87171; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif;
           background: var(--bg); color: var(--text);
           display:flex; justify-content:center; padding:2rem; }
    .wrap { width:100%; max-width:760px; }
    h1 { font-size:1.6rem; margin-bottom:.25rem; }
    p.sub { color:var(--muted); margin-top:0; }
    .row { display:flex; gap:.5rem; margin:1.5rem 0; }
    input { flex:1; padding:.75rem 1rem; border-radius:8px;
            border:1px solid #334155; background:var(--card);
            color:var(--text); font-size:1rem; }
    button { padding:.75rem 1.5rem; border:none; border-radius:8px;
             background:var(--accent); color:#0f172a; font-weight:600;
             font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .status { color:var(--muted); margin:1rem 0; }
    .error { color:var(--danger); }
    table { width:100%; border-collapse:collapse; margin-top:1rem; }
    th, td { text-align:left; padding:.6rem .5rem;
             border-bottom:1px solid #334155; font-size:.92rem; }
    th { color:var(--muted); font-weight:500; }
    .score { font-weight:700; }
    .s-high { color:var(--danger); }
    .s-mid  { color:#fbbf24; }
    code { color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PhishWatch</h1>
    <p class="sub">Find live lookalike domains impersonating your brand.</p>

    <div class="row">
      <input id="domain" type="text" placeholder="yourcompany.com"
             autocomplete="off" />
      <button id="scanBtn">Scan</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results"></div>
  </div>

  <script>
    const btn = document.getElementById("scanBtn");
    const input = document.getElementById("domain");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    async function scan() {
      const domain = input.value.trim();
      if (!domain) { statusEl.textContent = "Please enter a domain."; return; }

      // Disable button + show progress (from the UX quiz).
      btn.disabled = true;
      resultsEl.innerHTML = "";
      statusEl.className = "status";
      statusEl.textContent = "Scanning… this can take up to a minute.";

      try {
        const res = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain })
        });
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();
        render(data);
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = "Scan failed: " + err.message;
      } finally {
        btn.disabled = false;   // always re-enable, success or fail
      }
    }

    function render(data) {
      if (data.count === 0) {
        statusEl.textContent =
          `No live lookalikes found for ${data.target}. `;
        return;
      }
      statusEl.textContent =
        `Found ${data.count} live lookalike domain(s) for ${data.target}:`;

      const rows = data.results.map(r => {
        const cls = r.score >= 6 ? "s-high" : r.score >= 4 ? "s-mid" : "";
        return `<tr>
          <td><code>${r.domain}</code></td>
          <td class="score ${cls}">${r.score}/7</td>
          <td>${r.reasons.join("; ")}</td>
        </tr>`;
      }).join("");

      resultsEl.innerHTML = `
        <table>
          <thead><tr><th>Domain</th><th>Score</th><th>Signals</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    btn.addEventListener("click", scan);
    input.addEventListener("keydown", e => { if (e.key === "Enter") scan(); });
  </script>
</body>
</html>
